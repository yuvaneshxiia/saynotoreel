<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:'Rajdhani',sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#1b2735,#090a0f 40%),
    radial-gradient(circle at bottom right,#0f1724,#000000 60%);
    color:white;
    overflow-x:hidden;
    padding:20px 14px 120px;
}
/* STARS */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
    background-size:60px 60px;
    background-position:0 0,30px 30px;
    opacity:0.08;
    z-index:-1;
}
/* GLOW */
.glow1,
.glow2{
    position:fixed;
    width:320px;
    height:320px;
    border-radius:50%;
    filter:blur(100px);
    z-index:-1;
}
.glow1{
    background:#00ffe5;
    top:-120px;
    left:-100px;
    opacity:0.18;
}
.glow2{
    background:#8f00ff;
    bottom:-120px;
    right:-100px;
    opacity:0.18;
}
/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
}
/* NAME */
.name-section{
    display:flex;
    align-items:center;
    gap:10px;
    flex:1;
}
.username{
    flex:1;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    padding:14px 20px;
    border-radius:20px;
    font-size:clamp(20px,5vw,38px);
    font-family:'Orbitron',sans-serif;
    color:#00ffe5;
}

.edit-name-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:20px;
    background:
    linear-gradient(135deg,#00ffe5,#0077ff);
    box-shadow:
    0 0 15px rgba(0,255,229,0.35);
    color:white;
}

/* PROFILE */

.profile-wrapper{
    position:relative;
}

.profile{
    width:78px;
    height:78px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #00ffe5;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.edit-profile-btn{
    position:absolute;
    bottom:-5px;
    right:-5px;
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:

    color:white;
    box-shadow:
    0 0 10px rgba(0,255,229,0.35);
}

/* SCORE */

.score-box{
    display:flex;
    justify-content:center;
    margin-bottom:28px;
}

.score{
    padding:16px 30px;
    border-radius:22px;

    color:black;
    box-shadow:
    0 0 20px rgba(255,214,10,0.45);
}

/* RESET */

.reset-box{
    display:flex;
    justify-content:center;
    margin-bottom:25px;
}

.reset-btn{
    border:none;
    padding:10px 20px;
    border-radius:14px;
    cursor:pointer;
    font-family:'Orbitron',sans-serif;
    font-size:14px;
    color:white;
    background:
    linear-gradient(135deg,#ff004c,#ff6a00);
    box-shadow:
    0 0 15px rgba(255,0,76,0.4);
    transition:0.3s;
}

.reset-btn:hover{
    transform:scale(1.05);
}

/* HOURS */

.hours-container{
    width:100%;
    max-width:900px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* ROW */

.hour-row{
    display:flex;
    align-items:center;
    gap:18px;
}

/* TIME BOX */

.time-box{
    flex:1;
    min-height:92px;
    border-radius:24px;
    display:flex;
    align-items:center;
    padding:0 22px;
    font-size:clamp(16px,4vw,28px);
    font-family:'Orbitron',sans-serif;
    color:#00ffe5;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
    inset 0 0 12px rgba(255,255,255,0.05),
    0 0 12px rgba(0,255,229,0.08);
}

/* CHECK */

.check-wrapper{
    width:105px;
    height:92px;
    border-radius:24px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
}

.check-container{
    position:relative;
    width:62px;
    height:62px;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    background:
    linear-gradient(135deg,#ff003c,#ff0080);
    box-shadow:
    0 0 22px rgba(255,0,60,0.75),
    0 0 44px rgba(255,0,60,0.35),
    inset 0 0 10px rgba(255,255,255,0.15);
    transition:0.35s ease;
}

.check-container:has(input:checked){
    background:
    linear-gradient(135deg,#39ff14,#00ffb3);
    box-shadow:
    0 0 26px rgba(57,255,20,0.85),
    0 0 55px rgba(57,255,20,0.45),
    inset 0 0 10px rgba(255,255,255,0.2);
}

/* CHECKBOX — invisible, stretched to fill the whole box so any tap counts */

.check-container input{
    appearance:none;
    -webkit-appearance:none;
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    margin:0;
    opacity:0;
    cursor:pointer;
}

/* TICK — rendered on the box itself, fades in only when checked */

.check-container::after{
    content:'✔';
    pointer-events:none;
    color:rgba(255,255,255,0);
    font-size:26px;
    font-weight:bold;
    transition:0.3s ease;
}

.check-container:has(input:checked)::after{
    color:#05070d;
    text-shadow:0 0 8px rgba(255,255,255,0.6);
}

/* BUTTON */

.finish-btn{
    width:100%;
    height:82px;
    border:none;
    border-radius:22px;
    margin-top:20px;
    cursor:pointer;
    font-size:clamp(22px,5vw,36px);
    font-family:'Orbitron',sans-serif;
    background:
    linear-gradient(135deg,#ffe600,#ff9900);
    color:black;
}

/* POPUP */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-card{

}

.popup-score{

    }

<script>

/* GET TIMES */

let sleepTime =
localStorage.getItem("sleepTime")
|| "22:30";

let wakeTime =
localStorage.getItem("wakeTime")
|| "06:30";

/* CONVERT TO MINUTES */

function convertToMinutes(time){

    let parts = time.split(":");

    return (
        parseInt(parts[0]) * 60
        +
        parseInt(parts[1])
    );
}

/* FORMAT */

function formatTime(minutes){

    minutes =
    minutes % (24 * 60);

    let hour =
    Math.floor(minutes / 60);

    let minute =
    minutes % 60;

    let ampm =
    hour >= 12 ? "PM" : "AM";

    hour =
    hour % 12;

    if(hour === 0){

        hour = 12;
    }

    return `
    ${hour}:${minute
    .toString()
    .padStart(2,'0')}
    ${ampm}
    `;
}

/* START & END */

let start =
convertToMinutes(wakeTime);

let end =
convertToMinutes(sleepTime);

if(end <= start){

    end += 24 * 60;
}

/* CONTAINER */

let container =
document.getElementById(
"hoursContainer"
);

/* CREATE HOURS */

let index = 0;

for(
    let current = start;
    current < end;
    current += 60
){

    let next =
    current + 60;

    if(next > end){

        next = end;
    }

    let checkedState =
    localStorage.getItem(
    "check_" + index
    ) === "true";

    let row =
    document.createElement("div");

    row.className =
    "hour-row";

    row.innerHTML = `

    <div class="time-box">

        ${formatTime(current)}
        -
        ${formatTime(next)}

    </div>

    <div class="check-wrapper">

        <label class="check-container">

            <input
            type="checkbox"
            class="hourCheck"
            data-id="${index}"
            ${checkedState ? "checked" : ""}>

        </label>

    </div>

    `;

    container.appendChild(row);

    index++;
}

/* SAVE CHECKBOX */

/* SCORE */

function calculateScore(){

    let checks =
    document.querySelectorAll(
    ".hourCheck"
    );

    let checked = 0;

    checks.forEach(check=>{

        if(check.checked){

            checked++;
        }

    });

    let score =
    checked * 10;

    document.getElementById(
    "scoreValue"
    ).innerText = score;

    document.getElementById(
    "finalScore"
    ).innerText =
    score + " 🪙";

    localStorage.setItem(
    "todayScore",
    score
    );

    saveTodayScore(score);

    document.getElementById(
    "popup"
    ).style.display =
    "flex";

    document.getElementById("popup").style.display =
    "flex";
}

/* RESET */

function resetAllChecks(){

    let checks =
    document.querySelectorAll(
    ".hourCheck"
    );

    checks.forEach((check,index)=>{

        check.checked = false;

        localStorage.removeItem(
        "check_" + index
        );
    });

    document.getElementById(
    "scoreValue"
    ).innerText = 0;
}

/* DATE & TIME FIX */

function updateDate(){

    let today = new Date();

    let days = [
        "SUNDAY",
        "MONDAY",
        "TUESDAY",
        "WEDNESDAY",
        "THURSDAY",
        "FRIDAY",
        "SATURDAY"
    ];

    let day = days[today.getDay()];


    let date =
    String(today.getDate()).padStart(2,'0')
    + "-"
    +
    String(today.getMonth()+1).padStart(2,'0')
    + "-"
    +
    today.getFullYear();


    let hours = today.getHours();

    let minutes =
    String(today.getMinutes()).padStart(2,'0');


    let seconds =
    String(today.getSeconds()).padStart(2,'0');


    let ampm =
    hours >= 12 ? "PM" : "AM";


    hours =
    hours % 12;


    if(hours === 0){
        hours = 12;
    }


    let time =
    hours + ":" +
    minutes + ":" +
    seconds + " " +
    ampm;


    document.getElementById("dateBox")
    .innerHTML =
    `${day}<br>${date}<br>${time}`;

}


updateDate();

setInterval(updateDate,1000);

function saveTodayScore(score){

    let today =
    new Date();


    let date =
    today.toLocaleDateString();



    let day =
    today.toLocaleDateString(
    'en-US',
    {
        weekday:'long'
    }
    );



    let data =
    JSON.parse(
    localStorage.getItem("weeklyData")
    ) || [];



    // CHECK DUPLICATE DAY

    let alreadySaved =
    data.some(item=>item.date===date);



    if(!alreadySaved){

        data.push({

            date:date,

            day:day,

            score:score,

            sleep:sleepTime,

            wake:wakeTime

        });

    }



    localStorage.setItem(
    "weeklyData",
    JSON.stringify(data)
    );



    // 7 DAY GIFT UNLOCK

    if(data.length >= 7){

        showGiftBox();

    }

}


function generateWeeklyPDF(){


let data =
JSON.parse(
localStorage.getItem("weeklyData")
)||[];


if(data.length===0){

alert(
"No weekly data available"
);

return;

}


const {jsPDF}=window.jspdf;


let pdf =
new jsPDF();


let name =
localStorage.getItem("userName")
||"REEL FREE USER";


pdf.setFontSize(22);

pdf.text(
"REEL FREE SPACE",
20,
20
);


pdf.setFontSize(14);

pdf.text(
"WEEKLY PERFORMANCE REVIEW",
20,
32
);


pdf.text(
"USER : "+name,
20,
45
);


let y=65;

let total=0;


data.forEach((item,index)=>{


pdf.text(
`${index+1}. ${item.day} ${item.date}`,
20,
y
);


pdf.text(
`Sleep: ${item.sleep}  Wake: ${item.wake}`,
30,
y+8
);


pdf.text(
`Score : ${item.score} Coins`,
30,
y+16
);


total += Number(item.score);


y+=28;


if(y>270){

pdf.addPage();

y=20;

}


});


pdf.text(
"TOTAL SCORE : "+total,
20,
y+10
);


pdf.text(
"AVERAGE : "+
Math.round(total/data.length),
20,
y+25
);



pdf.save(
"Reel_Free_Weekly_Report.pdf"
);


}

// ============================================================
// OPEN WEEK GIFT — manual, replayable, cinematic animation flow
// (Steps: completed -> waiting -> opening -> confetti -> reward -> keep going)
// ============================================================

let wgStage = 1;
let wgTimers = [];

function clearWgTimers(){

    wgTimers.forEach(t=>clearTimeout(t));

    wgTimers = [];

}

function openWeekGiftFlow(){

    wgStage = 1;

    document.getElementById("weekGiftOverlay").style.display = "flex";

    renderWeekGiftStage();

}

function closeWeekGiftFlow(){

    clearWgTimers();

    document.getElementById("weekGiftOverlay").style.display = "none";

}

function advanceWeekGift(){

    wgStage++;

    renderWeekGiftStage();

}

function renderWeekGiftStage(){

    clearWgTimers();

    let body = document.getElementById("weekGiftBody");

    if(wgStage === 1){

        body.innerHTML = `
        <div class="stage-in">
            <div class="stage-eyebrow">STEP 1 / 6</div>
            <h1>🎉 7 DAYS COMPLETED</h1>
            <p>Amazing! You stayed consistent for one week.</p>
            <div class="gift-stage">
                <div class="gift-box-wrap">
                    <div class="gift-box">🎁</div>
                </div>
            </div>
            <button class="open-gift-btn" onclick="advanceWeekGift()">OPEN GIFT</button>
        </div>
        `;

    } else if(wgStage === 2){

        body.innerHTML = `
        <div class="stage-in">
            <div class="stage-eyebrow">STEP 2 / 6</div>
            <h1>Your reward is waiting…</h1>
            <div class="gift-stage">
                <div class="gift-box-wrap">
                    <div class="ring r1"></div>
                    <div class="ring r2"></div>
                    <div class="gift-box">🎁</div>
                </div>
            </div>
        </div>
        `;

        wgTimers.push(setTimeout(()=>{ wgStage = 3; renderWeekGiftStage(); }, 1200));

    } else if(wgStage === 3){

        body.innerHTML = `
        <div class="stage-in">
            <div class="stage-eyebrow">STEP 3 / 6</div>
            <h1>Opening your gift…</h1>
            <div class="gift-stage">
                <div class="burst"></div>
                <div class="gift-box opening">🎁</div>
            </div>
        </div>
        `;

        wgTimers.push(setTimeout(()=>{ wgStage = 4; renderWeekGiftStage(); }, 1100));

    } else if(wgStage === 4){

        body.innerHTML = `
        <div class="stage-in">
            <div class="stage-eyebrow">STEP 4 / 6</div>
            <h1>Congratulations! You earned it! 🎉</h1>
            <div class="gift-stage confetti-stage" id="confettiStage"></div>
        </div>
        `;

        spawnWeekGiftConfetti();

        wgTimers.push(setTimeout(()=>{ wgStage = 5; renderWeekGiftStage(); }, 1600));

    } else if(wgStage === 5){

        let gift = rewards[Math.floor(Math.random() * rewards.length)];

        body.innerHTML = `
        <div class="stage-in">
            <div class="stage-eyebrow">STEP 5 / 6</div>
            <h1>⭐ YOUR REWARD ⭐</h1>
            <div class="reward-card-v2">
                <div class="r-icon">${gift.split(" ")[0]}</div>
                <div class="r-name">${gift.substring(gift.indexOf(" ")+1)}</div>
            </div>
            <button class="open-gift-btn" onclick="advanceWeekGift()">AWESOME!</button>
        </div>
        `;

    } else if(wgStage === 6){

        body.innerHTML = `
        <div class="stage-in">
            <div class="stage-eyebrow">STEP 6 / 6</div>
            <div class="check-circle">✔</div>
            <h1 style="margin-top:18px;">Keep going, champion!</h1>
            <p>Many more rewards await you.</p>
            <button class="open-gift-btn" onclick="closeWeekGiftFlow()">LET'S DO IT! 💪</button>
        </div>
        `;

    }

}

function spawnWeekGiftConfetti(){

    let stage = document.getElementById("confettiStage");

    if(!stage) return;

    const colors = ["#00ffe5","#8f00ff","#ffe600","#ff004c","#00a2ff"];

    for(let i=0; i<26; i++){

        let piece = document.createElement("div");

        piece.className = "confetti-piece";

        piece.style.left = (Math.random()*100) + "%";

        piece.style.background = colors[Math.floor(Math.random()*colors.length)];

        piece.style.animationDelay = (Math.random()*0.35) + "s";

        piece.style.animationDuration = (1.1 + Math.random()*0.7) + "s";

        stage.appendChild(piece);

    }

}
